<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiago Antunes</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

     <!--índice do site-->
    <header>
        <h1>Thiago Antunes</h1>
        <nav>
            <a href="sobre.html">Sobre Mim</a>
            <a href="formacao.html">Formação</a>
            <a href="portfolio.html">Portfólio</a>
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <!--aqui é o conteúdo da página -->
    <main>
       <section class="contato">
            <h2>Contato</h2>

            <form id="formulario">
                <label>Nome Completo:</label><br>
                <input type="text" id="nome"><br><br>

                <label>E-mail:</label><br>
                <input type="text" id="email"><br><br>

                <label>Mensagem:</label><br>
                <textarea id="mensagem"></textarea><br><br>

                <button type="submit">Enviar</button>
            </form>

            <p id="msg"></p>
        </section>
    </main>

    <script>
        const form = document.getElementById("formulario");
        const msg = document.getElementById("msg");

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            let nome = document.getElementById("nome").value;
            let email = document.getElementById("email").value;
            let mensagem = document.getElementById("mensagem").value;

        // esse trecho irá verificar se os campos estão vazios
        if (nome == "" || email == "" || mensagem == "") {
            msg.innerText = "Preencha todos os campos!";
            return;
        }

        // aqui ocorre a validação do e-mail
        if (!email.includes("@") || !email.includes(".")) {
            msg.innerText = "E-mail inválido!";
            return;
        }

        // aqui é a mensagem de envio
        msg.innerText = "Mensagem enviada com sucesso!";

        // uso form.reset() para limpar os campos depois de enviado
        form.reset();
        });
    </script>

    <footer>
        <p>2026  Thiago Antunes</p>
    </footer>

</body>
</html>
